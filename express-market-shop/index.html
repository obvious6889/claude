<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Експрес Маркет Магазин</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #game-container {
      position: relative;
      line-height: 0;
    }

    canvas { display: block; }

    /* ── Notification bar ── */
    #notification {
      display: none;
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180, 60, 10, 0.96);
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    /* ── Order panel ── */
    #order-panel {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(14, 30, 14, 0.97);
      border-top: 3px solid #4CAF50;
      padding: 14px 18px;
      color: #fff;
      z-index: 100;
      max-height: 56%;
      overflow-y: auto;
    }

    #order-panel h2 {
      color: #4CAF50;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .order-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .order-item {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 7px;
      padding: 8px 10px;
    }

    .prod-name  { font-weight: bold; font-size: 13px; margin-bottom: 2px; }
    .prod-stock { color: #aaa; font-size: 11px; }
    .prod-price { color: #FFD700; font-size: 11px; margin-bottom: 4px; }

    .qty-control { display: flex; align-items: center; gap: 6px; }

    .qty-btn {
      background: #4CAF50;
      border: none;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-btn:hover { background: #388E3C; }

    .qty-display { min-width: 28px; text-align: center; font-size: 16px; font-weight: bold; }

    .order-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

    .btn-confirm, .btn-cancel {
      border: none;
      padding: 9px 22px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }
    .btn-confirm { background: #4CAF50; color: #fff; }
    .btn-confirm:hover { background: #388E3C; }
    .btn-cancel  { background: #555; color: #fff; }
    .btn-cancel:hover  { background: #444; }

    /* ── Price panel ── */
    #price-panel {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(20, 14, 50, 0.97);
      border-top: 3px solid #FFD700;
      padding: 14px 18px;
      color: #fff;
      z-index: 100;
      max-height: 56%;
      overflow-y: auto;
    }
    #price-panel h2 { color: #FFD700; font-size: 18px; margin-bottom: 12px; }
    .price-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .price-markup { font-size: 11px; margin-bottom: 4px; }
    .price-btn {
      background: #997700;
      border: none;
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .price-btn:hover { background: #775500; }

    /* ── Materials store panel ── */
    #store-panel {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(10, 24, 10, 0.97);
      border-top: 3px solid #CC8800;
      padding: 14px 18px;
      color: #fff;
      z-index: 100;
      max-height: 60%;
      overflow-y: auto;
    }
    #store-panel h2 { color: #CC8800; font-size: 18px; margin-bottom: 12px; }
    .store-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }
    .store-item {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,200,50,0.2);
      border-radius: 7px;
      padding: 10px 12px;
    }
    .store-item-name  { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
    .store-item-price { color: #FFD700; font-size: 12px; margin-bottom: 2px; }
    .store-item-inv   { color: #88FFAA; font-size: 11px; margin-bottom: 6px; }
    .store-item-req   { color: #AAAAAA; font-size: 10px; margin-bottom: 6px; }

    /* ── Home delivery panel ── */
    #home-panel {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 18, 50, 0.97);
      border-top: 3px solid #4488FF;
      padding: 14px 18px;
      color: #fff;
      z-index: 100;
      max-height: 56%;
      overflow-y: auto;
    }
    #home-panel h2 { color: #88BBFF; font-size: 18px; margin-bottom: 12px; }
    #home-order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .home-order-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(100,150,255,0.2);
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 14px;
    }
    .home-order-info { flex: 1; }
    .home-order-items { color: #AADDFF; font-weight: bold; }
    .home-order-earn  { color: #00FF88; font-size: 13px; margin-top: 2px; }
    .home-order-missing { color: #FF6644; font-size: 12px; margin-top: 2px; }
    .btn-fulfill {
      background: #2255AA;
      border: none;
      color: #fff;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }
    .btn-fulfill:hover { background: #3366CC; }
    .btn-fulfill:disabled { background: #333; color: #666; cursor: default; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="notification"></div>

    <div id="order-panel">
      <h2>🖥 Комп'ютер замовлень</h2>
      <div class="order-grid" id="order-grid"></div>
      <div class="order-actions">
        <button class="btn-cancel"  id="btn-cancel-order">Закрити</button>
        <button class="btn-confirm" id="btn-confirm-order">✔ Замовити</button>
      </div>
    </div>

    <div id="store-panel">
      <h2>🏗 Магазин будматеріалів</h2>
      <div class="store-grid" id="store-grid"></div>
      <div class="order-actions">
        <button class="btn-confirm" id="btn-store-leave">🏠 Їхати додому →</button>
      </div>
    </div>

    <div id="price-panel">
      <h2>💰 Управління цінами</h2>
      <div class="price-grid" id="price-grid"></div>
      <div class="order-actions">
        <button class="btn-cancel" id="btn-close-prices">Закрити</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
